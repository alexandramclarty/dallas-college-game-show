<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CETL's Dallas College Game Show</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dc-blue:      #002F87;
      --dc-blue-dark: #001a52;
      --dc-blue-mid:  #00256a;
      --dc-red:       #E52626;
      --bright-blue:  #1E8EF7;
      --green:        #309C3F;
      --gold:         #F5C518;
      --gold-dark:    #c9a200;
      --white:        #ffffff;
      --off-white:    #EEF2FF;
      --gray:         #666666;
      --team-champy:     #1E8EF7;
      --team-sasquatch:  #309C3F;
      --team-thunderbird:#E52626;
      --team-jackalope:  #F5C518;
    }

    html, body {
      height: 100%;
      background: var(--dc-blue-dark);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
    }

    .game-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 0 0 16px;
    }

    /* ── Header ── */
    .game-header {
      text-align: center;
      padding: 18px 20px 12px;
      background: linear-gradient(180deg, #00185e 0%, var(--dc-blue-dark) 100%);
      border-bottom: 3px solid var(--gold);
    }
    .game-header h1 {
      font-size: clamp(1.1rem, 3vw, 1.9rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--gold);
      text-shadow: 0 0 24px rgba(245,197,24,0.4), 2px 2px 0 rgba(0,0,0,0.5);
      line-height: 1.15;
    }
    .game-header .subtitle {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--off-white);
      opacity: 0.7;
      margin-top: 3px;
    }

    /* ── Board ── */
    .board-container {
      flex: 1;
      padding: 14px 12px 8px;
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .category-header {
      background: var(--dc-blue);
      border: 2px solid rgba(245,197,24,0.5);
      border-radius: 6px;
      padding: 12px 8px;
      text-align: center;
      font-size: clamp(0.6rem, 1.4vw, 0.8rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--white);
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.2;
    }
    .card {
      background: var(--dc-blue);
      border: 2px solid rgba(245,197,24,0.35);
      border-radius: 6px;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(245,197,24,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .card:hover:not(.used) {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 8px 28px rgba(245,197,24,0.3), 0 0 0 2px var(--gold);
      background: var(--dc-blue-mid);
      z-index: 2;
    }
    .card:active:not(.used) { transform: scale(0.98); }
    .card .card-value {
      font-size: clamp(1.2rem, 2.8vw, 2rem);
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 16px rgba(245,197,24,0.5), 2px 2px 0 rgba(0,0,0,0.5);
      letter-spacing: 0.02em;
    }
    .card.used {
      background: var(--dc-blue-dark);
      border-color: rgba(255,255,255,0.07);
      cursor: default;
      opacity: 0.4;
    }
    .card.used .card-value { opacity: 0; }

    /* ════════════════════════════════════════
       STANDARD FLIP MODAL
    ════════════════════════════════════════ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,10,40,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
      flex-direction: column;
      gap: 16px;
    }
    .modal-overlay.active { display: flex; }

    .flip-scene {
      width: 100%;
      max-width: 760px;
      height: 50vh;
      min-height: 300px;
      max-height: 560px;
      perspective: 1200px;
    }
    .flip-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0.2, 0.2, 1);
    }
    .flip-card.flipped { transform: rotateY(180deg); }
    .flip-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 12px;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 60px rgba(245,197,24,0.25), 0 24px 60px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    .flip-front {
      background: var(--dc-blue);
      border: 3px solid var(--gold);
      transform: rotateY(0deg);
    }
    .flip-back {
      background: var(--dc-blue-mid);
      border: 3px solid #4af0c0;
      transform: rotateY(180deg);
    }
    .face-tag {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
      opacity: 0.85;
      flex-shrink: 0;
    }
    .flip-front .face-tag { color: var(--gold); }
    .flip-back  .face-tag { color: #4af0c0; }
    .face-points {
      font-size: 2.6rem;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 24px rgba(245,197,24,0.5);
      line-height: 1;
      margin-bottom: 14px;
      flex-shrink: 0;
    }
    .face-body {
      font-size: clamp(1.1rem, 2.6vw, 1.5rem);
      font-weight: 700;
      color: var(--white);
      line-height: 1.5;
      flex: 1;
      overflow: hidden;
    }
    /* Front: question text with optional image stacked below */
    .flip-front .face-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .flip-front .face-body img {
      max-width: 100%;
      max-height: 85%;
      border-radius: 8px;
      object-fit: contain;
      display: block;
    }
    /* Back: image left, question + answer right */
    .flip-back .face-body {
      display: flex;
      flex-direction: row;
      gap: 18px;
      align-items: flex-start;
    }
    .back-image-col {
      flex: 0 0 48%;
      max-width: 48%;
      height: 100%;
      display: flex;
      align-items: flex-start;
    }
    .answer-image {
      max-width: 100%;
      max-height: 85%;
      border-radius: 8px;
      object-fit: contain;
      display: block;
    }
    .back-text-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }
    /* No image: full-width centered */
    .flip-back .face-body.no-image {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .back-question-repeat {
      font-size: clamp(0.78rem, 1.6vw, 0.95rem);
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      line-height: 1.4;
      font-style: italic;
    }
    .back-answer-text {
      font-size: clamp(1rem, 2.2vw, 1.3rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.4;
    }
    /* Multiple choice list on question face */
    .mc-list {
      list-style: none;
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .mc-item {
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-size: clamp(1rem, 2.4vw, 1.35rem);
      font-weight: 700;
      color: var(--white);
    }
    .mc-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.8em;
      height: 1.8em;
      border-radius: 50%;
      background: var(--gold);
      color: var(--dc-blue-dark);
      font-size: 0.75em;
      font-weight: 900;
      flex-shrink: 0;
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.35; }
      50%       { opacity: 0.65; }
    }

    /* ── Shared controls area ── */
    .modal-controls {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .award-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease 0.3s;
      width: 100%;
    }
    .award-row.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .award-label {
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--off-white);
      opacity: 0.7;
      width: 100%;
      margin-bottom: 2px;
    }
    .btn {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      padding: 13px 20px;
      cursor: pointer;
      transition: transform 0.1s, filter 0.1s;
    }
    .btn:hover  { transform: translateY(-2px); filter: brightness(1.1); }
    .btn:active { transform: scale(0.97); }
    .btn-flip {
      background: var(--gold);
      color: var(--dc-blue-dark);
      box-shadow: 0 4px 14px rgba(245,197,24,0.4);
      flex: 1;
    }
    .btn-close {
      background: rgba(255,255,255,0.12);
      color: var(--white);
    }
    .btn-close:hover { background: rgba(255,255,255,0.2); }
    .btn-team {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 16px;
      font-size: 0.9rem;
      border-radius: 6px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 2px solid transparent;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: transform 0.1s, filter 0.1s;
      flex: 1;
    }
    .btn-team:hover  { transform: translateY(-2px); filter: brightness(1.15); }
    .btn-team:active { transform: scale(0.96); }
    .btn-team img { width: 30px; height: 30px; object-fit: contain; }
    .btn-team.champy      { background: var(--team-champy);     color: #fff; box-shadow: 0 3px 12px rgba(30,142,247,0.4); }
    .btn-team.sasquatch   { background: var(--team-sasquatch);  color: #fff; box-shadow: 0 3px 12px rgba(48,156,63,0.4); }
    .btn-team.thunderbird { background: var(--team-thunderbird);color: #fff; box-shadow: 0 3px 12px rgba(229,38,38,0.4); }
    .btn-team.jackalope   { background: var(--team-jackalope);  color: var(--dc-blue-dark); box-shadow: 0 3px 12px rgba(245,197,24,0.4); }
    .action-row { display: flex; gap: 12px; width: 100%; }

    /* ════════════════════════════════════════
       WHEEL OF FORTUNE MODAL
    ════════════════════════════════════════ */
    .wof-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,10,40,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
      flex-direction: column;
      gap: 14px;
    }
    .wof-overlay.active { display: flex; }

    .wof-card {
      width: 100%;
      max-width: 760px;
      background: var(--dc-blue);
      border: 3px solid var(--gold);
      border-radius: 12px;
      padding: 28px 32px;
      box-shadow: 0 0 60px rgba(245,197,24,0.25), 0 24px 60px rgba(0,0,0,0.6);
    }

    .wof-header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 20px;
    }
    .wof-tag {
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.75;
    }
    .wof-points {
      font-size: 2rem;
      font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(245,197,24,0.5);
      line-height: 1;
    }

    /* The phrase display — tiles per word on separate rows */
    .wof-phrase {
      display: flex;
      flex-wrap: wrap;
      gap: 14px 20px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .wof-word {
      display: flex;
      gap: 5px;
    }
    .wof-tile {
      width: 36px;
      height: 46px;
      border-radius: 5px;
      border: 2px solid rgba(245,197,24,0.5);
      background: var(--dc-blue-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 900;
      color: transparent; /* hidden until revealed */
      text-transform: uppercase;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }
    .wof-tile.revealed {
      color: var(--white);
      background: var(--dc-blue);
      border-color: var(--gold);
    }
    .wof-tile.revealed::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(245,197,24,0.15) 0%, transparent 60%);
    }
    /* Flash animation when a letter is revealed */
    .wof-tile.flash {
      animation: tileFlash 0.4s ease-out;
    }
    @keyframes tileFlash {
      0%   { background: var(--gold); }
      100% { background: var(--dc-blue); }
    }

    /* Alphabet buttons */
    .wof-alphabet {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      margin-bottom: 16px;
    }
    .wof-letter {
      width: 38px;
      height: 38px;
      border-radius: 6px;
      border: none;
      background: var(--dc-blue-mid);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.1s, background 0.15s;
      text-transform: uppercase;
      border: 2px solid rgba(255,255,255,0.15);
    }
    .wof-letter:hover:not(:disabled) {
      transform: translateY(-2px);
      background: var(--dc-blue);
      border-color: var(--gold);
    }
    .wof-letter:disabled { cursor: default; opacity: 0.5; }
    .wof-letter.hit  { background: var(--green);  border-color: var(--green);  color: #fff; opacity: 1 !important; }
    .wof-letter.miss { background: var(--dc-red);  border-color: var(--dc-red); color: #fff; opacity: 1 !important; }

    /* WoF action buttons */
    .wof-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn-wof-reveal {
      background: var(--gold);
      color: var(--dc-blue-dark);
      box-shadow: 0 4px 14px rgba(245,197,24,0.4);
      flex: 1;
    }

    /* Award row reused inside WoF */
    .wof-award-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      width: 100%;
      max-width: 760px;
    }
    .wof-award-row.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Scoreboard ── */
    .scoreboard {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 8px 12px 0;
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
    }
    .score-card {
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.3s;
    }
    .score-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.12;
      background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 70%);
      pointer-events: none;
    }
    .score-card.champy      { background: var(--team-champy);     box-shadow: 0 4px 16px rgba(30,142,247,0.3); }
    .score-card.sasquatch   { background: var(--team-sasquatch);  box-shadow: 0 4px 16px rgba(48,156,63,0.3); }
    .score-card.thunderbird { background: var(--team-thunderbird);box-shadow: 0 4px 16px rgba(229,38,38,0.3); }
    .score-card.jackalope   { background: var(--team-jackalope);  box-shadow: 0 4px 16px rgba(245,197,24,0.3); }
    .score-card.pulse { animation: scorePulse 0.5s ease-out; }
    @keyframes scorePulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    .score-logo { width: 48px; height: 48px; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    .score-info { flex: 1; }
    .score-team-name { font-size: 0.62rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.9); line-height: 1; margin-bottom: 2px; }
    .score-card.jackalope .score-team-name { color: rgba(0,25,80,0.9); }
    .score-points { font-size: clamp(1.4rem, 2.5vw, 2rem); font-weight: 900; color: #fff; line-height: 1; text-shadow: 0 2px 6px rgba(0,0,0,0.3); }
    .score-card.jackalope .score-points { color: var(--dc-blue-dark); }
    .score-controls { display: flex; flex-direction: column; gap: 4px; }
    .score-adj-btn {
      width: 24px; height: 24px; border-radius: 4px; border: none;
      background: rgba(0,0,0,0.2); color: #fff; font-size: 1rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      line-height: 1; transition: background 0.1s; font-family: 'Montserrat', sans-serif;
    }
    .score-card.jackalope .score-adj-btn { color: var(--dc-blue-dark); }
    .score-adj-btn:hover { background: rgba(0,0,0,0.35); }

    .game-footer {
      text-align: center;
      padding: 10px 20px 4px;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.88) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    @media (max-width: 700px) {
      .board { gap: 5px; }
      .card { min-height: 52px; }
      .scoreboard { grid-template-columns: repeat(2, 1fr); }
      .flip-face { padding: 22px 18px; }
      .face-points { font-size: 2rem; }
      .wof-tile { width: 28px; height: 38px; font-size: 1rem; }
      .wof-letter { width: 32px; height: 32px; font-size: 0.75rem; }
    }
    @media (max-width: 480px) {
      .category-header { font-size: 0.55rem; padding: 8px 4px; min-height: 52px; }
      .card .card-value { font-size: 1rem; }
    }
  </style>
</head>
<body>

<div class="game-wrapper">
  <header class="game-header">
    <h1>CETL's Dallas College Game Show</h1>
    <div class="subtitle">Center for Excellence in Teaching &amp; Learning</div>
  </header>
  <div class="board-container">
    <div class="board" id="game-board"></div>
  </div>
  <div class="scoreboard" id="scoreboard"></div>
  <div class="game-footer">CETL &bull; Dallas College &bull; Game Show Edition</div>
</div>

<!-- ── Standard Flip Modal ── -->
<div class="modal-overlay" id="modal-overlay">
  <div class="flip-scene" id="flip-scene">
    <div class="flip-card" id="flip-card">
      <div class="flip-face flip-front">
        <div class="face-tag" id="front-category">Category</div>
        <div class="face-points" id="front-points">$100</div>
        <div class="face-body" id="front-question">Question text here.</div>

      </div>
      <div class="flip-face flip-back">
        <div class="face-tag">Answer</div>
        <div class="face-body" id="back-answer">Answer here.</div>
      </div>
    </div>
  </div>
  <div class="modal-controls">
    <div class="action-row">
      <button class="btn btn-flip" id="btn-flip" onclick="flipCard()">Reveal Answer</button>
      <button class="btn btn-close" id="btn-close-pre" onclick="closeModal()">Close (No Award)</button>
    </div>
    <div class="award-row" id="award-row">
      <div class="award-label">Award Points To:</div>
      <button class="btn-team champy"      onclick="awardPoints('champy')"><img src="assets/Cryptid_Crest_Crest_Champy_Blue.png" alt="Champy" /> Champy</button>
      <button class="btn-team sasquatch"   onclick="awardPoints('sasquatch')"><img src="assets/Cryptid_Crest_Crest_Sasquatch_Green.png" alt="Sasquatch" /> Sasquatch</button>
      <button class="btn-team thunderbird" onclick="awardPoints('thunderbird')"><img src="assets/Cryptid_Crest_Crest_Thunderbird_Red.png" alt="Thunderbird" /> Thunderbird</button>
      <button class="btn-team jackalope"   onclick="awardPoints('jackalope')"><img src="assets/Cryptid_Crest_Crest_Jackalope_Yellow.png" alt="Jackalope" /> Jackalope</button>
      <button class="btn btn-close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<!-- ── Wheel of Fortune Modal ── -->
<div class="wof-overlay" id="wof-overlay">
  <div class="wof-card">
    <div class="wof-header">
      <div class="wof-tag" id="wof-category">Category</div>
      <div class="wof-points" id="wof-points">$400</div>
    </div>
    <!-- Phrase tiles rendered here -->
    <div class="wof-phrase" id="wof-phrase"></div>
    <!-- A–Z buttons -->
    <div class="wof-alphabet" id="wof-alphabet"></div>
    <!-- Actions -->
    <div class="wof-actions">
      <button class="btn btn-wof-reveal" onclick="wofRevealAll()">Reveal Answer</button>
      <button class="btn btn-close" onclick="closeWof()">Close (No Award)</button>
    </div>
  </div>
  <!-- Award row appears after reveal -->
  <div class="wof-award-row" id="wof-award-row">
    <div class="award-label">Award Points To:</div>
    <button class="btn-team champy"      onclick="awardPoints('champy')"><img src="assets/Cryptid_Crest_Crest_Champy_Blue.png" alt="Champy" /> Champy</button>
    <button class="btn-team sasquatch"   onclick="awardPoints('sasquatch')"><img src="assets/Cryptid_Crest_Crest_Sasquatch_Green.png" alt="Sasquatch" /> Sasquatch</button>
    <button class="btn-team thunderbird" onclick="awardPoints('thunderbird')"><img src="assets/Cryptid_Crest_Crest_Thunderbird_Red.png" alt="Thunderbird" /> Thunderbird</button>
    <button class="btn-team jackalope"   onclick="awardPoints('jackalope')"><img src="assets/Cryptid_Crest_Crest_Jackalope_Yellow.png" alt="Jackalope" /> Jackalope</button>
  </div>
</div>

<script>
  // ── Game Data ─────────────────────────────────────────────────────────────
  // Special flag: wof: true  →  launches Wheel of Fortune mode
  //               wofPhrase  →  the phrase to guess (required when wof: true)
  // Answer types for standard cards:
  //   { a: "Text" }                         text only
  //   { aImg: "assets/img.png" }            image only
  //   { a: "Text", aImg: "assets/img.png" } text + image

  const categories = [
    "Don't Mess with DFW",
    "Know Your Campus Cryptids",
    "Meet the Class",
    "Not Just an Org Chart",
    "Your Mission, Should You Choose to Accept It",
  ];

  const questions = {
    "Don't Mess with DFW": [
      { q: "This beloved invention was created in Dallas in 1971, inspired by a 7-Eleven Slurpee machine.", a: "The frozen margarita machine", aImg: "assets/frozen-marg-machine.webp" },
      { q: "How many U.S. states have a smaller population than the DFW metro area?", choices: ["28", "33", "38", "43"], a: "38", aImg: "assets/states-less-pop-than-dfw.webp" },
      { q: "DFW Airport is so large it has its own zip code — and it's bigger than this entire island.", a: "Manhattan", aImg: "assets/dfw-larger-than-manhattan.jpg" },
      { q: "DFW ranks this among the most diverse metro areas in the United States.", choices: ["2nd", "5th", "7th", "10th"], a: "5th", aImg: "assets/most-diverse-metros.png" },
      { q: "DFW is adding people at a rate of roughly this many per day.", choices: ["125", "350", "700", "1,200"], a: "350 people per day" },
    ],
    "Know Your Campus Cryptids": [
      { q: "Cedar Valley campus is represented by one of the three bird-based Dallas College mascots, though the name sounds more like a nod to our region's dominant weather.", a: "The Suns", aImg: "assets/cv-suns.jpg" },
      { q: "The El Centro campus mascot is the _____ — fitting, since it's perched in a historic downtown department store building on Main Street.", a: "Eagles", aImg: "assets/el-centro-eagles.webp" },
      { q: "Eastfield campus's mascot changed from a harvester (the human kind) to this insect in 2017, though the original name stuck.", a: "Harvester Bee", aImg: "assets/eastfield-bees.jpg" },
      { q: "The _____ represent the North Lake campus, which has a large bronze horse statue dedicated to its mascot.", a: "Blazers", aImg: "assets/north-lake-blazers.png" },
      { q: "The _____ call Richland campus home — and yes, these birds actually swim on the lake that separates its buildings.", a: "Thunderducks", aImg: "assets/richland-thunderducks.jpg" },
    ],
    "Meet the Class": [
      { q: "Roughly 3 out of 4 Dallas College students are enrolled this way, meaning most of your students have a lot going on outside your classroom.", a: "Part-time" },
      { q: "27% of Dallas College students are under the age of 18. What program brings many of them here?", a: "Dual Credit" },
      { q: "If you picture a \"typical college student\" as someone living on campus and going to school full-time, this is roughly the percent of your Dallas College students that actually describes.", a: "0%" },
      { q: "More than half of Dallas College students identify with this ethnic group.", a: "Hispanic" },
      { q: "Roughly this percentage of our students are food insecure, making campus resources like the food pantry especially valuable.", a: "50%" },
    ],
    "Not Just an Org Chart": [
      { q: "The functional areas of Dallas College are Academics, Student Success, Operations, and Advancement & Innovation. Which functional area are you — and CETL! — in?", a: "Academics", aImg: "assets/functional-areas.png" },
      { q: "Dallas College faculty are organized broadly into ______, then further divided by discipline. Do you know which one you\'re in?", a: "Schools", aImg: "assets/academics-schools-disciplines.png" },
      { q: "If you have questions about your assigned courses, who\'s the best person to talk to?", a: "Your department chair", aImg: "assets/your-chair.png" },
      { q: "You\'ve received an important email about Dallas College from our chancellor! What\'s his name?", a: "Dr. Justin Lonon", aImg: "assets/dr-lonon.webp" },
      { q: "You\'ll regularly receive updates about faculty processes and requirements from our provost. What\'s her name?", a: "Dr. Shawnda Floyd", aImg: "assets/dr-floyd.webp" },
    ],
    "Your Mission, Should You Choose to Accept It": [
      { q: "The mission of Dallas College is to ensure ________ is vibrant, growing and economically viable for current and future generations.", a: "Dallas County" },
      { q: "Dallas College recently became one of only a handful of community colleges in the country to offer this type of degree.", a: "A bachelor's degree" },
      { q: "One of Dallas College's strategic priorities is to \"create a seamless, supportive experience for students to succeed from enrollment through graduation and career placement,\" summarized in these two words.", a: "Student Success" },
      { q: "Wheel of Fortune time! Guess the Dallas College mission statement one letter at a time.",
        wof: true,
        wofPhrase: "Transform lives and communities through higher education" },
      { q: "Can you name Dallas College's six core values? Here's a hint.", qImg: "assets/values-empty.png", aImg: "assets/values.png" },
    ],
  };

  // ── Teams ─────────────────────────────────────────────────────────────────
  const teams = [
    { id: "champy",      name: "Champy",      logo: "assets/Cryptid_Crest_Crest_Champy_Blue.png",      score: 0 },
    { id: "sasquatch",   name: "Sasquatch",   logo: "assets/Cryptid_Crest_Crest_Sasquatch_Green.png",  score: 0 },
    { id: "thunderbird", name: "Thunderbird", logo: "assets/Cryptid_Crest_Crest_Thunderbird_Red.png",  score: 0 },
    { id: "jackalope",   name: "Jackalope",   logo: "assets/Cryptid_Crest_Crest_Jackalope_Yellow.png", score: 0 },
  ];

  // ── State ─────────────────────────────────────────────────────────────────
  let currentCard  = null;
  let isFlipped    = false;
  let wofRevealed  = new Set(); // letters guessed correctly
  let wofGuessed   = new Set(); // all guessed letters (hit or miss)
  const usedCards  = new Set();
  const pointValues = [100, 200, 300, 400, 500];

  // ── Build Board ───────────────────────────────────────────────────────────
  function buildBoard() {
    const board = document.getElementById('game-board');
    board.innerHTML = '';
    categories.forEach(cat => {
      const h = document.createElement('div');
      h.className = 'category-header';
      h.textContent = cat;
      board.appendChild(h);
    });
    pointValues.forEach((pts, rowIdx) => {
      categories.forEach(cat => {
        const key  = `${cat}__${rowIdx}`;
        const card = document.createElement('div');
        card.className = 'card' + (usedCards.has(key) ? ' used' : '');
        card.dataset.cat = cat;
        card.dataset.row = rowIdx;
        card.innerHTML = `<span class="card-value">$${pts}</span>`;
        card.addEventListener('click', () => openCard(cat, rowIdx, key));
        board.appendChild(card);
      });
    });
  }

  // ── Build Scoreboard ──────────────────────────────────────────────────────
  function buildScoreboard() {
    const sb = document.getElementById('scoreboard');
    sb.innerHTML = '';
    teams.forEach(team => {
      const card = document.createElement('div');
      card.className = `score-card ${team.id}`;
      card.id = `score-card-${team.id}`;
      card.innerHTML = `
        <img class="score-logo" src="${team.logo}" alt="${team.name}" />
        <div class="score-info">
          <div class="score-team-name">${team.name}</div>
          <div class="score-points" id="score-${team.id}">${team.score}</div>
        </div>
        <div class="score-controls">
          <button class="score-adj-btn" onclick="manualAdj('${team.id}', 100)">+</button>
          <button class="score-adj-btn" onclick="manualAdj('${team.id}', -100)">−</button>
        </div>`;
      sb.appendChild(card);
    });
  }

  // ── Open Card — routes to WoF or standard flip ────────────────────────────
  function openCard(cat, rowIdx, key) {
    if (usedCards.has(key)) return;
    const q = questions[cat][rowIdx];
    currentCard = { cat, rowIdx, key, points: pointValues[rowIdx] };

    if (q.wof) {
      openWof(q, cat, rowIdx);
    } else {
      openFlip(q, cat, rowIdx);
    }
  }

  // ── Standard Flip ─────────────────────────────────────────────────────────
  function openFlip(q, cat, rowIdx) {
    isFlipped = false;
    document.getElementById('flip-card').classList.remove('flipped');

    document.getElementById('front-category').textContent = cat;
    document.getElementById('front-points').textContent   = `$${pointValues[rowIdx]}`;

    const frontQ = document.getElementById('front-question');
    frontQ.innerHTML = '';
    if (q.qImg) {
      const img = document.createElement('img');
      img.src = q.qImg; img.alt = 'Question image';
      frontQ.appendChild(img);
    }
    if (q.q) {
      // Detect multiple choice: options stored in q.choices array
      if (q.choices) {
        const qText = document.createElement('span');
        qText.textContent = q.q;
        frontQ.appendChild(qText);
        const ol = document.createElement('ol');
        ol.className = 'mc-list';
        const labels = ['A', 'B', 'C', 'D'];
        q.choices.forEach((choice, i) => {
          const li = document.createElement('li');
          li.className = 'mc-item';
          li.innerHTML = `<span class="mc-label">${labels[i]}</span>${choice}`;
          ol.appendChild(li);
        });
        frontQ.appendChild(ol);
      } else {
        const span = document.createElement('span');
        span.textContent = q.q;
        frontQ.appendChild(span);
      }
    }

    // Build back face: image left col + (question repeat + answer) right col
    const backA = document.getElementById('back-answer');
    backA.innerHTML = '';
    const hasImg = !!q.aImg;
    backA.className = 'face-body' + (hasImg ? '' : ' no-image');

    if (hasImg) {
      // Image column
      const imgCol = document.createElement('div');
      imgCol.className = 'back-image-col';
      const img = document.createElement('img');
      img.src = q.aImg; img.alt = 'Answer image';
      img.className = 'answer-image';
      imgCol.appendChild(img);
      backA.appendChild(imgCol);

      // Text column
      const textCol = document.createElement('div');
      textCol.className = 'back-text-col';
      if (q.q) {
        const qRepeat = document.createElement('div');
        qRepeat.className = 'back-question-repeat';
        qRepeat.textContent = q.q;
        textCol.appendChild(qRepeat);
      }
      if (q.a) {
        const aText = document.createElement('div');
        aText.className = 'back-answer-text';
        aText.textContent = q.a;
        textCol.appendChild(aText);
      }
      backA.appendChild(textCol);
    } else {
      // No image — centered question repeat + answer
      if (q.q) {
        const qRepeat = document.createElement('div');
        qRepeat.className = 'back-question-repeat';
        qRepeat.textContent = q.q;
        backA.appendChild(qRepeat);
      }
      if (q.a) {
        const aText = document.createElement('div');
        aText.className = 'back-answer-text';
        aText.textContent = q.a;
        backA.appendChild(aText);
      }
    }

    document.getElementById('btn-flip').style.display = '';
    document.getElementById('btn-close-pre').style.display = '';
    document.getElementById('award-row').classList.remove('visible');
    document.getElementById('modal-overlay').classList.add('active');
  }

  function flipCard() {
    if (isFlipped) return;
    isFlipped = true;
    document.getElementById('flip-card').classList.add('flipped');
    document.getElementById('btn-flip').style.display = 'none';
    document.getElementById('btn-close-pre').style.display = 'none';
    setTimeout(() => {
      document.getElementById('award-row').classList.add('visible');
    }, 500);
  }

  function closeModal() {
    if (currentCard) markCardUsed();
    document.getElementById('modal-overlay').classList.remove('active');
    currentCard = null;
    isFlipped   = false;
  }

  // ── Wheel of Fortune ──────────────────────────────────────────────────────
  function openWof(q, cat, rowIdx) {
    wofRevealed = new Set();
    wofGuessed  = new Set();

    document.getElementById('wof-category').textContent = cat;
    document.getElementById('wof-points').textContent   = `$${pointValues[rowIdx]}`;
    document.getElementById('wof-award-row').classList.remove('visible');

    buildWofPhrase(q.wofPhrase);
    buildWofAlphabet(q.wofPhrase);

    document.getElementById('wof-overlay').classList.add('active');
  }

  function buildWofPhrase(phrase) {
    const container = document.getElementById('wof-phrase');
    container.innerHTML = '';
    // Split into words; spaces between words are implicit gaps
    phrase.split(' ').forEach(word => {
      const wordEl = document.createElement('div');
      wordEl.className = 'wof-word';
      [...word].forEach(char => {
        const tile = document.createElement('div');
        tile.className = 'wof-tile';
        tile.dataset.char = char.toLowerCase();
        // Non-alpha chars (apostrophes etc) reveal immediately
        if (!/[a-zA-Z]/.test(char)) {
          tile.textContent = char;
          tile.classList.add('revealed');
        } else {
          tile.textContent = char;
        }
        wordEl.appendChild(tile);
      });
      container.appendChild(wordEl);
    });
  }

  function buildWofAlphabet(phrase) {
    const container = document.getElementById('wof-alphabet');
    container.innerHTML = '';
    // Pre-reveal R, S, T, L, N, E like classic WoF final round? 
    // Nope — host controls everything, so just show all 26.
    'abcdefghijklmnopqrstuvwxyz'.split('').forEach(letter => {
      const btn = document.createElement('button');
      btn.className = 'wof-letter';
      btn.textContent = letter.toUpperCase();
      btn.dataset.letter = letter;
      btn.addEventListener('click', () => wofGuessLetter(letter, phrase));
      container.appendChild(btn);
    });
  }

  function wofGuessLetter(letter, phrase) {
    if (wofGuessed.has(letter)) return;
    wofGuessed.add(letter);

    const btn = document.querySelector(`.wof-letter[data-letter="${letter}"]`);
    btn.disabled = true;

    const phraseLC = phrase.toLowerCase();
    if (phraseLC.includes(letter)) {
      // Hit — reveal all matching tiles
      btn.classList.add('hit');
      wofRevealed.add(letter);
      document.querySelectorAll(`.wof-tile[data-char="${letter}"]`).forEach(tile => {
        tile.classList.add('revealed', 'flash');
        // Remove flash class after animation so it can re-trigger if needed
        tile.addEventListener('animationend', () => tile.classList.remove('flash'), { once: true });
      });
    } else {
      // Miss
      btn.classList.add('miss');
    }
  }

  function wofRevealAll() {
    // Reveal every unrevealed tile
    document.querySelectorAll('.wof-tile:not(.revealed)').forEach(tile => {
      tile.classList.add('revealed', 'flash');
    });
    // Disable all remaining letter buttons
    document.querySelectorAll('.wof-letter:not(:disabled)').forEach(btn => {
      btn.disabled = true;
    });
    // Show award buttons
    document.getElementById('wof-award-row').classList.add('visible');
  }

  function closeWof() {
    if (currentCard) markCardUsed();
    document.getElementById('wof-overlay').classList.remove('active');
    currentCard = null;
  }

  // ── Shared: Award Points ──────────────────────────────────────────────────
  function awardPoints(teamId) {
    if (!currentCard) return;
    const team = teams.find(t => t.id === teamId);
    team.score += currentCard.points;
    document.getElementById(`score-${teamId}`).textContent = team.score;
    const card = document.getElementById(`score-card-${teamId}`);
    card.classList.remove('pulse');
    void card.offsetWidth;
    card.classList.add('pulse');
    markCardUsed();
    // Close whichever modal is open
    document.getElementById('modal-overlay').classList.remove('active');
    document.getElementById('wof-overlay').classList.remove('active');
    currentCard = null;
    isFlipped   = false;
  }

  // ── Shared: Manual Adjust ─────────────────────────────────────────────────
  function manualAdj(teamId, delta) {
    const team = teams.find(t => t.id === teamId);
    team.score = Math.max(0, team.score + delta);
    document.getElementById(`score-${teamId}`).textContent = team.score;
  }

  // ── Shared: Mark Used ─────────────────────────────────────────────────────
  function markCardUsed() {
    if (!currentCard) return;
    usedCards.add(currentCard.key);
    document.querySelectorAll('#game-board .card').forEach(c => {
      if (c.dataset.cat === currentCard.cat && +c.dataset.row === currentCard.rowIdx) {
        c.classList.add('used');
      }
    });
  }

  // Overlay click to close
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('wof-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeWof();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeModal();
      closeWof();
      return;
    }
    if ((e.key === ' ' || e.key === 'Enter') && currentCard && !isFlipped) {
      e.preventDefault();
      flipCard();
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  buildBoard();
  buildScoreboard();
</script>
</body>
</html>
